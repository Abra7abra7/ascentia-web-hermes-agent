# fly.toml app configuration file for ascentia-web-hermes-agent
# Generated specifically for Go + HTMX + SQLite stack 2026

app = "ascentia-web-hermes-agent"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DB_PATH = "/data/ascentia.db"
  AI_PROVIDER = "mock"
  SMTP_PASS = "re_Vo78nycT_26FHEQj4mxP1KtY539fLqDo6"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  interval = "10s"
  grace_period = "5s"
  method = "get"
  path = "/"
  protocol = "http"
  timeout = "2s"

# SQLite perzistentné úložisko, aby ti po reštarte nemizli dopyty od zákazníkov
[mounts]
  source = "ascentia_data"
  destination = "/data"
