# fly.toml app configuration file for ascentia-web-hermes-agent
# Generated specifically for Go + HTMX + SQLite stack 2026

app = "ascentia-web-hermes-agent"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DB_PATH = "/data/ascentia.db"
  AI_PROVIDER = "mock"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["app"]

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.concurrency]]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

  [[services.http_checks]]
    interval = "10s"
    grace_period = "5s"
    method = "get"
    path = "/"
    protocol = "http"
    timeout = "2s"

# SQLite perzistentné úložisko, aby ti po reštarte nemizli dopyty od zákazníkov
[mounts]
  source = "ascentia_data"
  destination = "/data"
