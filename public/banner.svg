<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#09090B"/>
  <text x="600" y="200" font-family="Geist Sans,Inter,sans-serif" font-size="48" fill="#FAFAFA" text-anchor="middle">Ascentia AI-First Learning Platform</text>
  <!-- Simple grid mesh -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1F2937" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="400" fill="url(#grid)"/>
</svg>